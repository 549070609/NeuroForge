# Standard Preset
# Code assistant scenario

preset: standard
enabled:
  # Providers
  - providers.anthropic
  # Middleware
  - middleware.compaction
  - middleware.thinking
  # Integration
  - integration.events
  # Skills
  - skills.skill_loader
disabled: []
plugin_dirs:
  - plugins

config:
  middleware.compaction:
    enabled: true
    strategy: "simple"  # simple | agent
    trigger_threshold: 0.8
    adaptive: false

  middleware.thinking:
    level: "low"
