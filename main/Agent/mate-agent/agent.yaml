identity:
  name: mate-agent
  description: Agent 构建与管理专家 - 负责创建、修改、验证和管理其他 Agent
  tags:
    - meta
    - agent-builder
    - orchestrator

category: meta
cost: expensive

model:
  provider: anthropic
  model: claude-sonnet-4-20250514
  temperature: 0.3
  max_tokens: 8192

limits:
  max_iterations: 15
  timeout: 600

capabilities:
  tools:
    # CRUD 工具
    - create_agent
    - modify_agent
    - delete_agent
    - list_agents
    # 分析工具
    - validate_agent
    - analyze_requirements
    - check_dependencies
    # 配置工具
    - render_template
    - edit_config
    - write_prompt
    # 系统工具
    - spawn_subagent

  # 支持思考模式
  thinking: true

# 子Agent 配置 (位于 mate-agent/subagents/ 目录下)
subagents:
  builder:
    agent: mate-agent/subagents/builder-agent
    purpose: 实际构建 Agent 文件和配置
    triggers:
      - "创建 agent"
      - "新建 agent"
      - "build agent"

  modifier:
    agent: mate-agent/subagents/modifier-agent
    purpose: 修改现有 Agent 配置
    triggers:
      - "修改 agent"
      - "更新 agent"
      - "modify agent"

  analyzer:
    agent: mate-agent/subagents/analyzer-agent
    purpose: 分析需求和验证配置
    triggers:
      - "分析需求"
      - "验证配置"
      - "analyze"

  tester:
    agent: mate-agent/subagents/tester-agent
    purpose: 测试 Agent 功能
    triggers:
      - "测试 agent"
      - "验证 agent"
      - "test agent"

# 元数据
metadata:
  version: "1.0.0"
  author: "MateAgent System"
  created: "2026-02-21"
  description_zh: |
    MateAgent 是一个元级 Agent，专门负责构建、配置和管理其他 Agent。

    核心职责:
    - 根据用户需求创建新的 Agent
    - 修改和更新现有 Agent 配置
    - 验证 Agent 配置的正确性
    - 管理 Agent 生命周期
    - 协调子Agent 完成复杂任务

    工作流程:
    1. 分析用户需求，确定 Agent 类型和配置
    2. 选择合适的模板
    3. 调用 builder-agent 创建 Agent
    4. 使用 tester-agent 验证
    5. 返回创建结果

    适用场景:
    - 创建专用的代码审查 Agent
    - 构建特定领域的分析 Agent
    - 配置工具链 Agent
    - 批量管理 Agent
