# Full Preset
# Complete platform with all plugins

preset: full
enabled:
  # Providers
  - providers.anthropic
  - providers.openai
  - providers.google
  # Interface
  - interface.rest_api
  - interface.websocket
  # Protocol
  - protocol.mcp_server
  - protocol.mcp_client
  - protocol.lsp
  # Tools
  - tools.web_tools
  - tools.file_tools
  - tools.interact_tools
  # Middleware
  - middleware.compaction
  - middleware.failover
  - middleware.thinking
  # Integration
  - integration.events
  - integration.persistence
  - integration.context_aware
  - integration.parallel_executor
  # Skills
  - skills.skill_loader
disabled: []
plugin_dirs:
  - plugins

config:
  interface.rest_api:
    host: "0.0.0.0"
    port: 8080
    cors: true

  middleware.compaction:
    enabled: true
    strategy: "agent"  # 使用 Agent 智能压缩
    trigger_threshold: 0.75
    adaptive: true  # 启用自适应阈值调整
    agent_summary_max_tokens: 2000

  middleware.thinking:
    level: "medium"
    budget_tokens: 10000

  integration.persistence:
    storage_dir: "./sessions"
