# 日志格式示例

# ATON 格式示例:
# @schema[id:int, level:str, message:str]
# events(2):
#   1, "error", "Database connection failed"
#   2, "info", "User login successful"

# TOON 格式示例:
# events[2]{id,level,message}:
#   1,error,Database connection failed
#   2,info,User login successful

