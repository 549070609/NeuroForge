# 感知器配置示例 - 快速开始

# 这是感知器的最小配置示例
# 复制此文件到你的配置目录并根据需要修改

# 基础配置
enabled:
  - integration.perception

plugin_dirs:
  - "."  # 插件位于 main/perception/

# 感知器配置
config:
  integration.perception:
    # 是否启用
    enabled: true

    # 日志文件路径（可以是文件或目录）
    log_path: "./logs"

    # 过滤规则
    filter_rules:
      # 监控的日志级别
      level:
        - error
        - warn

      # Error 级别触发的决策
      error_triggers: "find_user"  # 通知用户

      # Warning 级别触发的决策
      warn_triggers: "find_user"   # 通知用户

---
