name: dev-story
description: '按照上下文填充的故事规范文件执行故事实现。当用户说"开发此故事 [故事文件]"或"实现冲刺计划中的下一个故事"时使用'

# Critical variables from config
config_source: "{project-root}/_bmad/bmm/config.yaml"
